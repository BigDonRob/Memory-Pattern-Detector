<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Pattern Detector</title>
    <link rel="stylesheet" href="memory_analyzer.css">
</head>
<body>
<div class="shell">

    <header class="app-header">
        <div class="header-left">
            <div class="logo-mark">⬡</div>
            <div>
                <h1>Memory Pattern Detector</h1>
                <p class="tagline">Bit-field and boolean transition analysis</p>
            </div>
        </div>
    </header>

    <!-- Mode -->
    <div class="mode-bar">
        <button class="mode-btn active" data-mode="quick">
            <span class="mode-icon">⚡</span>
            <span class="mode-text">
                <strong>Quick Scan</strong>
                <small>Changed addresses — bit &amp; boolean detection</small>
            </span>
        </button>
        <button class="mode-btn" data-mode="mass">
            <span class="mode-icon">⊞</span>
            <span class="mode-text">
                <strong>Mass Change</strong>
                <small>Find clusters matching an expected event count</small>
            </span>
        </button>
    </div>

    <!-- Instructions -->
    <details class="instructions-panel" open>
        <summary class="instructions-toggle">
            <span>Workflow Instructions</span>
            <span class="instr-chevron">▾</span>
        </summary>
        <div class="instructions-body" id="instructionsBody"></div>
    </details>

    <!-- Mass Change options -->
    <div class="mass-options" id="massOptions" style="display:none">
        <div class="mass-opt">
            <label>Expected changes</label>
            <input type="number" id="expectedCount" value="1" min="1" max="9999">
        </div>
        <div class="mass-opt">
            <label>Tolerance ±</label>
            <input type="number" id="tolerance" value="2" min="0" max="999">
        </div>
        <div class="mass-opt">
            <label>Cluster radius (bytes)</label>
            <input type="number" id="clusterRadius" value="256" min="4" max="65536" step="4">
        </div>
    </div>

    <!-- Upload -->
    <div class="upload-zone" id="uploadZone">
        <input type="file" id="csvFile" accept=".csv">
        <div class="upload-inner">
            <div class="upload-icon">↑</div>
            <div class="upload-label">Drop CSV or click to browse</div>
            <div class="upload-hint">Requires: Address, Value, InitialValue columns</div>
        </div>
    </div>

    <div class="file-bar" id="fileBar" style="display:none">
        <span class="file-name" id="fileName"></span>
        <label class="ns-toggle-label">
            <input type="checkbox" id="nonStandardToggle">
            <span class="ns-toggle-text">Non-Standard Booleans</span>
            <span class="ns-toggle-hint">0↔any · max↔non-max</span>
        </label>
        <button class="analyze-btn" id="analyzeBtn">Analyze</button>
    </div>

    <div class="status-bar" id="statusBar" style="display:none">
        <span id="statusText"></span>
    </div>

    <!-- Results -->
    <div class="results-shell" id="resultsShell" style="display:none">

        <!-- Shared direction filter -->
        <div class="dir-filter">
            <button class="dir-filter-btn active" data-filter="all">All</button>
            <button class="dir-filter-btn" data-filter="set">↑ Positive</button>
            <button class="dir-filter-btn" data-filter="clear">↓ Negative</button>
            <button class="dir-filter-btn" data-filter="mixed">⇅ Mixed</button>
        </div>

        <!-- Quick Scan results -->
        <div id="quickResults">
            <div class="section-label">Pattern Categories</div>
            <div class="summary-strip" id="summaryStrip"></div>
            <div class="table-area">
                <div class="table-header-row">
                    <span class="table-meta" id="tableMeta"></span>
                    <button class="export-btn" id="exportBtn">Export CSV</button>
                </div>
                <div class="table-wrap">
                    <table>
                        <thead>
                            <tr>
                                <th>Address</th>
                                <th>Current</th>
                                <th>Initial</th>
                                <th>XOR</th>
                                <th>Detail</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- Mass Change results -->
        <div id="massResults" style="display:none">
            <div class="section-label">
                Cluster Analysis
                <span class="section-hint" id="massResultMeta"></span>
            </div>
            <div class="cluster-list" id="clusterList"></div>
        </div>

    </div>
</div>
<script src="memory_analyzer.js"></script>
</body>
</html>
